<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; }
        canvas { background: #000; }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="controls">
        <p>Seed: <input type="number" id="seed" value="123" min="0"></p>
        <p>Particles: <input type="number" id="particleCount" value="100" min="1" max="500"></p>
        <p>Speed: <input type="number" id="speed" value="0.5" step="0.1"></p>
        <p>Noise Scale: <input type="number" id="noiseScale" value="0.01" step="0.001"></p>
        <p><button onclick="reset()">Reset</button></p>
    </div>
    <script>
        let seed = 123;
        let particleCount = 100;
        let speed = 0.5;
        let noiseScale = 0.01;
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            reset();
        }

        function reset() {
            seed = parseInt(document.getElementById('seed').value);
            particleCount = parseInt(document.getElementById('particleCount').value);
            speed = parseFloat(document.getElementById('speed').value);
            noiseScale = parseFloat(document.getElementById('noiseScale').value);
            
            randomSeed(seed);
            particles = createParticles();
        }

        function createParticles() {
            let particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: random(width),
                    y: random(height),
                    size: random(1, 5)
                });
            }
            return particles;
        }

        function updateParticles() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                let noiseVal = noise((p.x + frameCount) * noiseScale, (p.y + frameCount) * noiseScale);
                let angle = noiseVal * TWO_PI;
                
                p.x += cos(angle) * speed;
                p.y += sin(angle) * speed;
                
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
            }
        }

        function draw() {
            background(0, 50);
            updateParticles();
            
            fill(255);
            for (let p of particles) {
                ellipse(p.x, p.y, p.size, p.size);
            }
        }

        window.onresize = function() {
            resizeCanvas(windowWidth, windowHeight);
            reset();
        };
    </script>
</body>
</html>
